function buildPrompt(tech, allTechs, tactics, useFewShot = false) {
  const techList = allTechs.map(t => `${t.id}: ${t.name} [tactics: ${t.tactics.join(", ")}]`).join("\n");
  const tacticList = tactics.map(t => `${t.id}: ${t.name}`).join("\n");

  // Base prompt used for both modes
  const basePrompt = `You are an AI Security instructor using the MITRE ATLAS framework. The user selected technique: "${tech.id}: ${tech.name}" (${tech.desc}).

Available ATLAS tactics (in kill-chain order):
${tacticList}

Available techniques:
${techList}

Generate a realistic attack scenario that includes the selected technique. Return ONLY valid JSON (no markdown, no backticks):
{
  "title": "Short attack scenario name (max 8 words)",
  "scenario": "2-3 sentence scenario description of what the attacker wants to achieve",
  "attack_path": [
    {"tactic_id": "AML.TAxxxx", "technique_id": "AML.Txxxx", "technique_name": "...", "step_description": "1 sentence what attacker does at this step"}
  ],
  "example": "A concrete practical example showing how this specific attack could happen (3-4 sentences, with realistic details)",
  "defense": "Key mitigation strategy in 1-2 sentences",
  "severity": "critical|high|medium"
}

Rules:
- attack_path must have 3-6 steps following the kill-chain order
- The selected technique MUST be included in the path
- Use ONLY real ATLAS technique IDs from the list above
- example should be practical and educational, not just theory`;

  if (!useFewShot) return basePrompt;

  // Few-shot version for smaller local models (Ollama) — adds AI-native guidance + a concrete example
  return `${basePrompt}

CRITICAL GUIDANCE - This is MITRE ATLAS, not classical ATT&CK:
- Scenarios MUST be AI-native, not generic IT attacks
- Avoid "generic phishing → steal password → reverse shell" style chains. That's ATT&CK Enterprise, not ATLAS.
- Focus on AI-specific targets: ML models, training data, RAG systems, AI agents, LLM system prompts, MLOps infrastructure (Weights & Biases, MLflow, HuggingFace, model registries)
- Victims should be: data scientists, ML engineers, AI product teams, organizations using LLMs or AI agents
- Examples must mention SPECIFIC things: real tool names (wandb, MLflow, Pinecone, LangChain), real model families (GPT, Llama, Claude), real attack artifacts (poisoned embeddings, jailbreak prompts, backdoor triggers)
- Defenses should be AI-specific: model scanning, prompt filtering, RAG input validation, MLOps access controls — NOT just "enable MFA"

EXAMPLE of the quality level expected (for reference only, DO NOT copy this):

{
  "title": "MLOps Supply Chain Attack on Medical AI",
  "scenario": "An adversary targets data scientists at a medical AI company to gain access to their machine learning training infrastructure and proprietary diagnostic models. The attacker crafts convincing phishing emails that appear to come from the company's MLOps platform, tricking employees into revealing credentials that provide access to model repositories and training systems.",

function extractJSON(text) {
  // Remove markdown fences and extract JSON block
  let clean = text.replace(/```json|```/g, "").trim();
  // If there's text before/after the JSON, try to extract it
  const match = clean.match(/\{[\s\S]*\}/);
  if (match) clean = match[0];
  return JSON.parse(clean);
}

async function runSimulation(tech, allTechs, tactics, config) {
  const { provider, apiKey, ollamaUrl, ollamaModel, cloudModel } = config;
  // Use few-shot enriched prompt only for Ollama (smaller local models benefit hugely)
  // Claude and GPT already know ATLAS well enough without examples
  const prompt = buildPrompt(tech, allTechs, tactics, provider === "ollama");

  if (provider === "anthropic") {
    if (!apiKey) throw new Error("Anthropic API key required. Open settings (⚙) to add it.");
    const r = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": apiKey,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true",
      },
      body: JSON.stringify({
        model: cloudModel || "claude-sonnet-4-5",
        max_tokens: 1500,
        messages: [{ role: "user", content: prompt }],
      }),
    });
    if (!r.ok) {
      const err = await r.text();
      if (r.status === 401) throw new Error("Anthropic: Invalid API key. Check your key in settings (⚙). Make sure it starts with 'sk-ant-'.");
      if (r.status === 429) throw new Error("Anthropic: Rate limit exceeded. Wait a moment and try again.");
      if (r.status === 404) throw new Error(`Anthropic: Model "${cloudModel}" not found. Try a different model in settings (⚙).`);
      throw new Error(`Anthropic API error (${r.status}): ${err.slice(0, 200)}`);
    }
    const data = await r.json();
    const text = data.content?.map(i => i.text || "").join("") || "";
    return extractJSON(text);
  }

  if (provider === "openai") {
    if (!apiKey) throw new Error("OpenAI API key required. Open settings (⚙) to add it.");
    const model = cloudModel || "gpt-4o-mini";
    // Newer models (o1, o3, gpt-4o, chatgpt-4o) use max_completion_tokens; older use max_tokens
    const isReasoning = /^(o1|o3)/.test(model);
    const usesNewTokenParam = /^(o1|o3|gpt-4o|chatgpt-4o)/.test(model);
    const body = {
      model,
      messages: [{ role: "user", content: prompt }],
    };
    // Apply the correct token limit parameter
    if (usesNewTokenParam) {
      body.max_completion_tokens = 1500;
    } else {
      body.max_tokens = 1500;
    }
    if (!isReasoning) body.response_format = { type: "json_object" };
    const r = await fetch("https://api.openai.com/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${apiKey}`,
      },
      body: JSON.stringify(body),
    });
    if (!r.ok) {
      const err = await r.text();
      if (r.status === 401) throw new Error("OpenAI: Invalid API key. Check your key in settings (⚙).");
      if (r.status === 429) throw new Error("OpenAI: Rate limit exceeded. Wait a moment and try again.");
      if (r.status === 404) throw new Error(`OpenAI: Model "${model}" not found. You may not have access to it — try a different model in settings (⚙).`);
      throw new Error(`OpenAI API error (${r.status}): ${err.slice(0, 200)}`);
    }
    const data = await r.json();
    const text = data.choices?.[0]?.message?.content || "";
    return extractJSON(text);
  }

  if (provider === "ollama") {
    const url = (ollamaUrl || "http://localhost:11434").replace(/\/$/, "");
    const model = ollamaModel || "llama3.2";
    const r = await fetch(`${url}/api/chat`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model,
        messages: [{ role: "user", content: prompt }],
        stream: false,
        format: "json",
        options: {
          temperature: config.temperature ?? 0.6,
          top_p: config.topP ?? 0.9,
          num_ctx: config.numCtx ?? 8192,
          num_predict: config.numPredict ?? 2000,
        },
      }),
    });
    if (!r.ok) {
      throw new Error(`Ollama error (${r.status}). Is Ollama running at ${url}?`);
    }
    const data = await r.json();
    const text = data.message?.content || "";
    return extractJSON(text);
  }

  throw new Error("No AI provider configured. Click ⚙ to set up.");
}

function TuningSlider({ label, value, onChange, min, max, step, hint, default: defaultVal, integer }) {
  const isDefault = value === defaultVal;
  const displayValue = integer ? Math.round(value) : value;
  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
        <label style={{ fontSize: 10.5, color: "#cbd5e1", fontWeight: 600 }}>
          {label}
          {!isDefault && <span style={{ marginLeft: 6, fontSize: 9, color: "#f59e0b" }}>● modified</span>}
        </label>
        <input
          type="number"
          value={displayValue}
          onChange={e => {
            const v = integer ? parseInt(e.target.value) : parseFloat(e.target.value);
            if (!isNaN(v)) onChange(Math.max(min, Math.min(max, v)));
          }}
          min={min} max={max} step={step}
          style={{
            background: "#070a11", border: "1px solid #1e293b", borderRadius: 4,
            padding: "2px 6px", color: "#e2e8f0", fontSize: 10.5,
            fontFamily: "'JetBrains Mono', monospace", outline: "none",
            width: 70, textAlign: "right",
          }}
        />
      </div>
      <input
        type="range"
        value={value} onChange={e => onChange(parseFloat(e.target.value))}
        min={min} max={max} step={step}
        style={{
          width: "100%", height: 4, cursor: "pointer",
          accentColor: isDefault ? "#3b82f6" : "#f59e0b",
        }}
      />
      <div style={{ fontSize: 9.5, color: "#64748b", marginTop: 3, lineHeight: 1.4 }}>{hint}</div>
    </div>
  );
}

  // When provider switches, reset cloud model to that provider's default (if user hasn't set one)
  useEffect(() => {
    if ((provider === "anthropic" || provider === "openai") && !config.cloudModel) {
      setCloudModel(DEFAULT_CLOUD_MODEL[provider]);
    }
    setCloudModels(null);
    setCloudFetchResult(null);
  }, [provider]);

  const fetchCloudModels = useCallback(async () => {
    if (!apiKey) {
      setCloudFetchResult({ ok: false, msg: "Enter your API key first." });

    }
    setCloudFetching(true);
    setCloudFetchResult(null);
    try {
      let models = [];
      if (provider === "anthropic") {
        const r = await fetch("https://api.anthropic.com/v1/models", {
          headers: {
            "x-api-key": apiKey,

            "anthropic-dangerous-direct-browser-access": "true",
          },
        });
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        const data = await r.json();
        models = (data.data || [])
          .map(m => m.id)
          .filter(id => id && !id.includes("embedding"))
          .sort();
      } else if (provider === "openai") {
        const r = await fetch("https://api.openai.com/v1/models", {
          headers: { "Authorization": `Bearer ${apiKey}` },
        });
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        const data = await r.json();
        // Filter to chat-capable models only (gpt-*, o1-*, o3-*, chatgpt-*)
        models = (data.data || [])
          .map(m => m.id)
          .filter(id => id && /^(gpt-|o1-|o3-|chatgpt-)/.test(id))
          .filter(id => !/embedding|whisper|tts|dall-e|davinci|babbage|moderation|realtime|audio|transcribe/.test(id))
          .sort();
      }

      if (models.length === 0) {
        setCloudModels(FALLBACK_CLOUD_MODELS[provider]);
        setCloudFetchResult({ ok: true, msg: `No chat models returned. Showing common defaults.` });
      } else {
        setCloudModels(models);
        setCloudFetchResult({ ok: true, msg: `Loaded ${models.length} available model${models.length !== 1 ? "s" : ""} from ${provider === "anthropic" ? "Anthropic" : "OpenAI"}.` });
      }
    } catch (e) {
      setCloudModels(FALLBACK_CLOUD_MODELS[provider]);
      setCloudFetchResult({ ok: false, msg: `Could not fetch models (${e.message}). Showing common defaults — your key still works.` });
    }
    setCloudFetching(false);
  }, [provider, apiKey]);

    setLoadingModels(true);
    setTestResult(null);

      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const data = await r.json();
      const models = (data.models || []).map(m => m.name || m.model).filter(Boolean);
      setAvailableModels(models);
      if (models.length > 0 && !models.includes(ollamaModel)) {
        setTestResult({ ok: true, msg: `Found ${models.length} model${models.length !== 1 ? "s" : ""}. Current "${ollamaModel}" not installed — pick one from the dropdown.` });
      } else {
        setTestResult({ ok: true, msg: `Connected. ${models.length} model${models.length !== 1 ? "s" : ""} installed.` });
      }
    } catch (e) {
      setAvailableModels([]);
      setTestResult({ ok: false, msg: `Cannot reach Ollama at ${ollamaUrl}. Is it running? Is OLLAMA_ORIGINS="*" set?` });
    }
    setLoadingModels(false);
  }, [ollamaUrl, ollamaModel]);

  const testConnection = useCallback(async () => {
    setTesting(true);
    await fetchModels();
    setTesting(false);
  }, [fetchModels]);

  const resetTuning = () => {
    setTemperature(OLLAMA_DEFAULTS.temperature);
    setTopP(OLLAMA_DEFAULTS.topP);
    setNumCtx(OLLAMA_DEFAULTS.numCtx);
    setNumPredict(OLLAMA_DEFAULTS.numPredict);
  };

  const save = () => {
    const newConfig = { provider, apiKey, ollamaUrl, ollamaModel, cloudModel, temperature, topP, numCtx, numPredict };
    setConfig(newConfig);
    try {
      localStorage.setItem("atlas_sim_config", JSON.stringify(newConfig));
    } catch (e) { console.warn("localStorage unavailable"); }
    onClose();
  };

  const clearAll = () => {
    if (!confirm("Clear all saved settings including API keys?")) return;
    try { localStorage.removeItem("atlas_sim_config"); } catch (e) {}
    const fresh = { provider: "none", apiKey: "", ollamaUrl: "http://localhost:11434", ollamaModel: "llama3.2", cloudModel: DEFAULT_CLOUD_MODEL.anthropic, ...OLLAMA_DEFAULTS };
    setConfig(fresh);
    setProvider("none"); setApiKey(""); setOllamaUrl("http://localhost:11434"); setOllamaModel("llama3.2");
    setCloudModel(DEFAULT_CLOUD_MODEL.anthropic);
    resetTuning();
  };

  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.7)", zIndex: 2000, display: "flex", alignItems: "center", justifyContent: "center", padding: 20, backdropFilter: "blur(6px)", animation: "fadeIn 0.2s ease" }}

            <span style={{ fontSize: 18 }}>⚙</span>
            <h2 style={{ fontSize: 16, fontWeight: 700, color: "#fff", margin: 0, letterSpacing: -0.3 }}>AI Simulation Settings</h2>
          </div>

        </div>

        <p style={{ fontSize: 11.5, color: "#94a3b8", lineHeight: 1.5, marginBottom: 14 }}>

        {/* Provider Selection */}

            <div style={{ marginTop: 6, padding: "6px 9px", background: "#3b82f60a", border: "1px solid #3b82f622", borderRadius: 5 }}>

              <button onClick={() => setShowAdvanced(!showAdvanced)}

                  {/* Top P */}
                  <TuningSlider
                    label="Top P"

                    min={0} max={1} step={0.05}
                    hint="Nucleus sampling. 0.9 = balanced. Lower = safer vocabulary."
                    default={OLLAMA_DEFAULTS.topP}
                  />
                  {/* Num Context */}
                  <TuningSlider
                    label="Num Context"
                    value={numCtx}
                    onChange={setNumCtx}
                    min={2048} max={32768} step={1024}
                    hint="Max tokens the model can read. 8192 fits the ATLAS data + example. Bigger = more VRAM."
                    default={OLLAMA_DEFAULTS.numCtx}
                    integer
                  />
                  {/* Num Predict */}
                  <TuningSlider
                    label="Num Predict"
                    value={numPredict}
                    onChange={setNumPredict}
                    min={500} max={8192} step={100}
                    hint="Max tokens the model can generate. Too low = truncated JSON."

                    integer

                  <button onClick={resetTuning}
                    style={{ alignSelf: "flex-start", background: "none", border: "1px solid #334155", color: "#94a3b8", fontSize: 10, padding: "4px 10px", borderRadius: 4, cursor: "pointer", fontWeight: 600 }}>

          <div style={{ marginBottom: 14, padding: "10px 12px", background: "#3b82f60a", border: "1px solid #3b82f622", borderRadius: 7 }}>
            <div style={{ fontSize: 11, color: "#93c5fd", lineHeight: 1.5 }}>
              📖 Matrix-only mode. You can still explore all 16 tactics, 101 techniques, and their sub-techniques. The ⚡ Simulate button will be hidden.

        {/* Actions */}
        <div style={{ display: "flex", gap: 6, justifyContent: "space-between", alignItems: "center" }}>
          <button onClick={clearAll}
            style={{ background: "none", border: "1px solid #7f1d1d", color: "#f87171", fontSize: 11, padding: "7px 12px", borderRadius: 5, cursor: "pointer", fontWeight: 600 }}>
            Clear all data

          <div style={{ display: "flex", gap: 6 }}>
            <button onClick={onClose}
              style={{ background: "none", border: "1px solid #334155", color: "#94a3b8", fontSize: 11, padding: "7px 14px", borderRadius: 5, cursor: "pointer", fontWeight: 600 }}>
              Cancel

              style={{ background: "linear-gradient(135deg, #3b82f6, #2563eb)", border: "none", color: "#fff", fontSize: 11, padding: "7px 18px", borderRadius: 5, cursor: "pointer", fontWeight: 700, letterSpacing: 0.3 }}>
              Save
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

// === COMPONENTS ===
function TechCard({ tech, color, isSelected, onClick, idx, isHighlighted }) {
  const [hovered, setHovered] = useState(false);
  const num = tech.id.replace("AML.T", "");
  const hasSubs = tech.subs && tech.subs.length > 0;
  const isActive = hovered && !isSelected;
  const glowing = isHighlighted && !isSelected;

  // Dynamic font sizing based on name length to prevent overflow on hover
  const nameLen = tech.name.length;
  // Find longest single word — breaks on hyphens/slashes/spaces
  const longestWord = tech.name.split(/[\s\-\/]/).reduce((m, w) => w.length > m ? w.length : m, 0);

  let hoverNameSize = 12;
  if (nameLen > 40 || longestWord > 14) hoverNameSize = 10;
  else if (nameLen > 30 || longestWord > 12) hoverNameSize = 10.5;
  else if (nameLen > 22) hoverNameSize = 11;

  return (
    <div onClick={onClick} onMouseEnter={() => setHovered(true)} onMouseLeave={() => setHovered(false)}
      style={{
        background: isSelected ? color.border + "18" : glowing ? color.border + "20" : isActive ? color.border + "15" : color.bg,
        border: `${isActive ? 2 : 1.5}px solid ${isSelected || isActive || glowing ? color.border : color.border + "40"}`,
        borderRadius: 6,
        padding: isActive ? "9px 11px" : "5px 7px",
        cursor: "pointer",
        minHeight: isActive ? 68 : 48,
        display: "flex", flexDirection: "column", justifyContent: "space-between",
        animation: glowing ? "pathPulse 1.5s ease infinite" : `fadeIn 0.25s ease ${idx * 0.015}s both`,
        boxShadow: isSelected
          ? `0 0 14px ${color.glow}, inset 0 0 18px ${color.glow}`
          : glowing
          ? `0 0 16px ${color.border}44, 0 0 30px ${color.border}22`
          : isActive
          ? `0 0 18px ${color.border}55, 0 8px 26px rgba(0,0,0,0.55), inset 0 0 20px ${color.glow}`
          : "none",
        position: "relative",
        zIndex: isActive ? 10 : isSelected ? 5 : glowing ? 4 : 1,
        transform: isActive ? "scale(1.22)" : isSelected ? "scale(1.03)" : glowing ? "scale(1.05)" : "scale(1)",
        transformOrigin: "center center",
        overflow: "hidden",
        transition: "transform 0.22s cubic-bezier(0.34, 1.56, 0.64, 1), min-height 0.22s cubic-bezier(0.34, 1.56, 0.64, 1), padding 0.22s ease, border-color 0.15s ease, border-width 0.15s ease, box-shadow 0.2s ease, background 0.15s ease",
      }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 3 }}>
        <span style={{ fontSize: isActive ? 11 : 8.5, color: color.border, fontFamily: "'JetBrains Mono', monospace", fontWeight: 700, letterSpacing: 0.3, transition: "font-size 0.2s ease" }}>T{num}</span>
        {hasSubs && <span style={{ fontSize: isActive ? 8.5 : 7, background: color.border + "28", color: color.border, padding: isActive ? "2px 6px" : "1px 4px", borderRadius: 3, fontWeight: 700, lineHeight: isActive ? "16px" : "14px", transition: "all 0.2s ease" }}>{tech.subs.length}</span>}
        {glowing && <span style={{ fontSize: 7, background: "#ff475744", color: "#ff6b7a", padding: "1px 4px", borderRadius: 3, fontWeight: 700, lineHeight: "14px" }}>PATH</span>}
      </div>
      <div style={{
        fontSize: isActive ? hoverNameSize : 9.5,
        color: isActive ? "#fff" : glowing ? "#fff" : "#dde4ed",
        fontWeight: isActive || glowing ? 600 : 500,
        lineHeight: 1.22,
        letterSpacing: -0.2,
        marginTop: isActive ? 4 : 2,
        wordBreak: "break-word",
        overflowWrap: "anywhere",
        hyphens: "auto",
        transition: "font-size 0.2s ease, color 0.15s ease, margin-top 0.2s ease",
      }}>{tech.name}</div>
    </div>
  );
}

function SimPanel({ sim, onClose, color }) {
  if (!sim) return null;
  const sevColors = { critical: "#ef4444", high: "#f59e0b", medium: "#3b82f6" };
  const sevC = sevColors[sim.severity] || "#3b82f6";
  return (
    <div style={{ marginTop: 14, background: "#0a0e1799", border: "1px solid #1e293b", borderRadius: 8, padding: "16px 18px", animation: "fadeIn 0.3s ease" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
          <span style={{ fontSize: 16 }}>⚡</span>
          <span style={{ fontSize: 16, fontWeight: 700, color: "#fff", letterSpacing: -0.3 }}>{sim.title}</span>
          <span style={{ fontSize: 10, background: sevC + "22", color: sevC, padding: "3px 10px", borderRadius: 4, fontWeight: 700, border: `1px solid ${sevC}44`, textTransform: "uppercase", letterSpacing: 0.5 }}>{sim.severity}</span>
          {sim._autoInjected && (
            <span title="The model did not include the selected technique in its path. It was auto-inserted."
              style={{ fontSize: 9.5, background: "#f59e0b18", color: "#fbbf24", padding: "3px 10px", borderRadius: 4, fontWeight: 700, border: "1px solid #f59e0b44", letterSpacing: 0.3, cursor: "help" }}>
              ⚠ AUTO-CORRECTED
            </span>
          )}
        </div>
      </div>

      {sim._autoInjected && (

}

function DetailPanel({ tech, tacticName, color, onClose, highlightedTechs, setHighlightedTechs, config, onOpenSettings }) {
  const [sim, setSim] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const num = tech.id.replace("AML.T", "");
  const aiEnabled = config.provider && config.provider !== "none";

  const handleSimulate = useCallback(async () => {
    setLoading(true); setError(null); setSim(null); setHighlightedTechs([]);
    try {
      let result = await runSimulation(tech, ATLAS_DATA.techniques, ATLAS_DATA.tactics, config);
      let pathIds = (result.attack_path || []).map(s => s.technique_id);

      // Hard-enforcement: the selected technique MUST be in the path.
      // Local models (even good ones) often ignore this rule. We retry once with
      // a stricter prompt, then auto-inject + flag if it still fails.
      const techInPath = pathIds.some(id => id === tech.id || id.startsWith(tech.id + "."));
      if (!techInPath) {
        console.warn(`[ATLAS] Selected technique ${tech.id} missing from generated path. Retrying…`);
        try {
          // Retry with stricter config (lower temp for more compliant output)
          const retryConfig = { ...config, temperature: 0.3 };
          result = await runSimulation(tech, ATLAS_DATA.techniques, ATLAS_DATA.tactics, retryConfig);
          pathIds = (result.attack_path || []).map(s => s.technique_id);
        } catch (e) {
          console.warn("[ATLAS] Retry failed, keeping original result.", e);
        }

        // Check again after retry
        const stillMissing = !pathIds.some(id => id === tech.id || id.startsWith(tech.id + "."));
        if (stillMissing) {
          // Inject the selected technique at a sensible position based on its tactic.
          // Tactics list is already in kill-chain order, so we position by tactic index.
          const tacticOrder = ATLAS_DATA.tactics.map(t => t.id);
          const targetTacticIdx = tech.tactics && tech.tactics.length > 0
            ? tacticOrder.indexOf(tech.tactics[0])
            : -1;

          const injected = {
            tactic_id: tech.tactics?.[0] || "AML.TA0005",
            technique_id: tech.id,
            technique_name: tech.name,
            step_description: `Attacker leverages ${tech.name.toLowerCase()} as part of the attack (auto-inserted — the model did not include this technique in its generated path).`,
          };

          // Find the right insertion index based on kill-chain order
          const path = [...(result.attack_path || [])];
          let insertIdx = path.length; // default: end
          for (let i = 0; i < path.length; i++) {
            const stepTacticIdx = tacticOrder.indexOf(path[i].tactic_id);
            if (stepTacticIdx > targetTacticIdx) { insertIdx = i; break; }
          }
          path.splice(insertIdx, 0, injected);
          result = { ...result, attack_path: path, _autoInjected: true };
          pathIds = path.map(s => s.technique_id);
        } else {
          result = { ...result, _retrySucceeded: true };
        }
      }

      setSim(result);
      setHighlightedTechs(pathIds);
    } catch (e) {
      setError(e.message || "Simulation failed — try again.");
      console.error(e);
    }
    setLoading(false);
  }, [tech, setHighlightedTechs, config]);

  return (
    <div style={{
      position: "fixed", bottom: 0, left: 0, right: 0,
      background: "linear-gradient(to top, #080c14, #0e1420)",
      borderTop: `2px solid ${color.border}`,
      padding: "16px 24px", zIndex: 1000, animation: "slideUp 0.2s ease",
      boxShadow: `0 -6px 30px rgba(0,0,0,0.6), 0 -2px 12px ${color.glow}`,
      maxHeight: "65vh", overflowY: "auto",
    }}>
      <div style={{ maxWidth: 1400, margin: "0 auto" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
          <div style={{ flex: 1 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 5 }}>
              <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 22, color: color.border, fontWeight: 700 }}>T{num}</span>
              <span style={{ fontSize: 20, color: "#fff", fontWeight: 700, letterSpacing: -0.3 }}>{tech.name}</span>
            </div>
            <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 7, flexWrap: "wrap" }}>
              <span style={{ fontSize: 12, background: color.border + "18", color: color.border, padding: "3px 11px", borderRadius: 4, fontWeight: 600, border: `1px solid ${color.border}33` }}>{tacticName}</span>
              <span style={{ fontSize: 12, color: "#7a8599", fontFamily: "'JetBrains Mono', monospace" }}>{tech.id}</span>
            </div>
            {tech.desc && <p style={{ fontSize: 13.5, color: "#cbd5e1", lineHeight: 1.55, margin: "5px 0 10px", maxWidth: 800 }}>{tech.desc}</p>}
          </div>
          <div style={{ display: "flex", gap: 6, alignItems: "center", flexShrink: 0 }}>
            {/* SIMULATE BUTTON - only if AI is configured */}
            {aiEnabled ? (
              <button onClick={handleSimulate} disabled={loading}
                style={{
                  background: loading ? "#1e293b" : "linear-gradient(135deg, #f59e0b22, #ef444422)",
                  border: `1px solid ${loading ? "#334155" : "#f59e0b66"}`,
                  color: loading ? "#64748b" : "#fbbf24", fontSize: 11, fontWeight: 700,
                  padding: "6px 14px", borderRadius: 6, cursor: loading ? "wait" : "pointer",
                  display: "flex", alignItems: "center", gap: 6,
                  transition: "all 0.2s", letterSpacing: 0.3,
                }}
                onMouseEnter={e => { if (!loading) { e.currentTarget.style.background = "linear-gradient(135deg, #f59e0b33, #ef444433)"; e.currentTarget.style.borderColor = "#f59e0b"; }}}
                onMouseLeave={e => { if (!loading) { e.currentTarget.style.background = "linear-gradient(135deg, #f59e0b22, #ef444422)"; e.currentTarget.style.borderColor = "#f59e0b66"; }}}
              >
                {loading ? (<><span style={{ display: "inline-block", animation: "spin 1s linear infinite", fontSize: 13 }}>◌</span> Simulating...</>) : (<>⚡ Attack Simulation</>)}
              </button>
            ) : (
              <button onClick={onOpenSettings}
                style={{
                  background: "none", border: "1px dashed #475569",
                  color: "#94a3b8", fontSize: 11, fontWeight: 600,
                  padding: "6px 14px", borderRadius: 6, cursor: "pointer",
                  display: "flex", alignItems: "center", gap: 6,
                }}
                onMouseEnter={e => { e.currentTarget.style.borderColor = "#3b82f6"; e.currentTarget.style.color = "#3b82f6"; }}
                onMouseLeave={e => { e.currentTarget.style.borderColor = "#475569"; e.currentTarget.style.color = "#94a3b8"; }}
              >
                ⚙ Enable AI Simulation
              </button>
            )}
            <button onClick={() => { onClose(); setHighlightedTechs([]); setSim(null); }}
              style={{ background: "none", border: "1px solid #2a3040", color: "#7a8599", fontSize: 16, cursor: "pointer", borderRadius: 5, width: 30, height: 30, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}
              onMouseEnter={e => { e.currentTarget.style.borderColor = "#ef4444"; e.currentTarget.style.color = "#ef4444"; }}
              onMouseLeave={e => { e.currentTarget.style.borderColor = "#2a3040"; e.currentTarget.style.color = "#7a8599"; }}
            >✕</button>
          </div>
        </div>

        {/* Sub-techniques */}
        {tech.subs && tech.subs.length > 0 && (
          <div style={{ marginBottom: 6 }}>
            <div style={{ fontSize: 10, color: "#7a8599", marginBottom: 4, fontWeight: 700, textTransform: "uppercase", letterSpacing: 1 }}>Sub-Techniques ({tech.subs.length})</div>
            <div style={{ display: "flex", gap: 5, flexWrap: "wrap" }}>
              {tech.subs.map(sub => (
                <a key={sub.id} href={`https://atlas.mitre.org/techniques/${sub.id}`} target="_blank" rel="noopener noreferrer"
                  style={{ background: color.bg, border: `1px solid ${color.border}44`, borderRadius: 5, padding: "4px 9px", fontSize: 10.5, color: "#bcc5d3", fontWeight: 500, textDecoration: "none", transition: "border-color 0.15s" }}
                  onMouseEnter={e => e.currentTarget.style.borderColor = color.border}
                  onMouseLeave={e => e.currentTarget.style.borderColor = color.border + "44"}
                >
                  <span style={{ color: color.border, fontFamily: "'JetBrains Mono', monospace", fontSize: 9, marginRight: 4 }}>{sub.id}</span>{sub.name}
                </a>
              ))}
            </div>
          </div>
        )}

        <a href={`https://atlas.mitre.org/techniques/${tech.id}`} target="_blank" rel="noopener noreferrer"
          style={{ fontSize: 11, color: color.border, textDecoration: "none", fontWeight: 600 }}>View on ATLAS ↗</a>

        {/* Simulation Result */}
        {error && <div style={{ marginTop: 10, padding: "8px 12px", background: "#ef444418", border: "1px solid #ef444444", borderRadius: 6, color: "#fca5a5", fontSize: 12 }}>{error}</div>}
        {sim && <SimPanel sim={sim} color={color} onClose={() => { setSim(null); setHighlightedTechs([]); }} />}
      </div>
    </div>
  );
}

function ATLASMatrix() {
  const [selectedTech, setSelectedTech] = useState(null);
  const [selectedTactic, setSelectedTactic] = useState(null);
  const [filter, setFilter] = useState("");
  const [hoveredTactic, setHoveredTactic] = useState(null);
  const [highlightedTechs, setHighlightedTechs] = useState([]);
  const [showSettings, setShowSettings] = useState(false);
  const [config, setConfig] = useState({ provider: "none", apiKey: "", ollamaUrl: "http://localhost:11434", ollamaModel: "llama3.2", cloudModel: "claude-sonnet-4-5", temperature: 0.6, topP: 0.9, numCtx: 8192, numPredict: 2000 });

  // Load saved config from localStorage on mount
  useEffect(() => {
    try {
      const saved = localStorage.getItem("atlas_sim_config");
      if (saved) {
        const parsed = JSON.parse(saved);
        setConfig(c => ({ ...c, ...parsed }));
      }
    } catch (e) { console.warn("Could not load config from localStorage"); }
  }, []);

  const techsByTactic = useMemo(() => {
    const map = {};
    ATLAS_DATA.tactics.forEach(t => { map[t.id] = []; });
    ATLAS_DATA.techniques.forEach(tech => { tech.tactics.forEach(tid => { if (map[tid]) map[tid].push(tech); }); });
    // Sort alphabetically within each tactic to match the official ATLAS matrix layout
    Object.keys(map).forEach(tid => { map[tid].sort((a, b) => a.name.localeCompare(b.name)); });
    return map;
  }, []);

  const filteredTechs = useMemo(() => {
    if (!filter) return null;
    const q = filter.toLowerCase();
    return ATLAS_DATA.techniques.filter(t => t.name.toLowerCase().includes(q) || t.id.toLowerCase().includes(q) || (t.subs && t.subs.some(s => s.name.toLowerCase().includes(q))));
  }, [filter]);

  const totalTechs = ATLAS_DATA.techniques.length;
  const totalSubs = ATLAS_DATA.techniques.reduce((a, t) => a + (t.subs?.length || 0), 0);

  const handleSelectTech = (tech, tacticId) => {
    if (selectedTech?.id === tech.id && selectedTactic === tacticId) {
      setSelectedTech(null); setSelectedTactic(null); setHighlightedTechs([]);
    } else {
      setSelectedTech(tech); setSelectedTactic(tacticId);
    }
  };

  const activeTacticName = selectedTactic ? ATLAS_DATA.tactics.find(t => t.id === selectedTactic)?.name : "";
  const activeColor = selectedTactic ? TC[selectedTactic] : null;

  return (
    <div style={{ background: "#070a11", minHeight: "100vh", color: "#dde4ed", fontFamily: "'Inter', 'Segoe UI', system-ui, sans-serif" }}>

      <style>{`
        @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
        @keyframes slideUp { from { transform:translateY(100%); } to { transform:translateY(0); } }

        @keyframes pathPulse { 0%,100% { opacity:0.85; } 50% { opacity:1; } }
        ::-webkit-scrollbar { width:5px; height:5px; }
        ::-webkit-scrollbar-track { background:#070a11; }
        ::-webkit-scrollbar-thumb { background:#1a2030; border-radius:3px; }
      `}</style>

      <div style={{ position: "fixed", inset: 0, pointerEvents: "none", zIndex: 999, background: "repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(100,200,255,0.005) 3px, rgba(100,200,255,0.005) 4px)" }} />

      {/* Header */}
      <div style={{ background: "linear-gradient(180deg, #0c1018, #070a11)", borderBottom: "1px solid #151d2e", padding: "14px 20px 10px", position: "sticky", top: 0, zIndex: 100 }}>
        <div style={{ maxWidth: 1800, margin: "0 auto" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 10 }}>
            <div>
              <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 2 }}>
                <span style={{ fontFamily: "'Orbitron', monospace", fontSize: 22, fontWeight: 900, background: "linear-gradient(135deg, #3b82f6, #ec4899, #ef4444)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent", letterSpacing: 2 }}>MITRE ATLAS</span>
                <span style={{ fontSize: 9, background: "#dc262615", color: "#dc2626", padding: "2px 7px", borderRadius: 4, fontWeight: 700, border: "1px solid #dc262630", fontFamily: "'JetBrains Mono', monospace" }}>v5.5.0</span>

                  style={{ background: "#0e1420", border: "1px solid #1a2235", borderRadius: 6, padding: "7px 10px 7px 28px", color: "#dde4ed", fontSize: 12, width: 200, outline: "none", fontFamily: "inherit" }}

                <div style={{ fontSize: 8, fontFamily: "'JetBrains Mono',monospace", color: color.border, fontWeight: 600, marginBottom: 2, opacity: 0.75 }}>{tactic.id}</div>
                <div style={{ fontSize: 10.5, fontWeight: 700, color: "#e0e8f0", lineHeight: 1.15, marginBottom: 3 }}>{tactic.name}</div>
                <div style={{ fontSize: 8, color: color.border, fontWeight: 600, opacity: 0.6 }}>{cnt} technique{cnt !== 1 ? "s" : ""}</div>
                {hoveredTactic === tactic.id && (
                  <div style={{ position: "absolute", top: "calc(100% + 4px)", ...tooltipAlign, background: "#111827ee", border: `1px solid ${color.border}33`, borderRadius: 6, padding: "8px 11px", width: 220, zIndex: 100, boxShadow: "0 8px 24px rgba(0,0,0,0.5)", fontSize: 10.5, color: "#9ca3af", lineHeight: 1.4, textAlign: "left", backdropFilter: "blur(6px)" }}>
                    {tactic.desc}
                  </div>
                )}
              </div>
            );
          })}

          {ATLAS_DATA.tactics.map(tactic => {
            const color = TC[tactic.id];
            const techs = techsByTactic[tactic.id] || [];
            return (
              <div key={tactic.id + "-col"} style={{ display: "flex", flexDirection: "column", gap: 3 }}>
                {techs.map((tech, ti) => (
                  <TechCard key={tech.id + tactic.id} tech={tech} color={color} idx={ti} tacticId={tactic.id}
                    isSelected={selectedTech?.id === tech.id && selectedTactic === tactic.id}
                    isHighlighted={highlightedTechs.includes(tech.id)}
                    onClick={() => handleSelectTech(tech, tactic.id)} />
                ))}
              </div>
            );
          })}
        </div>
      </div>

      {/* Legend - stays fixed at bottom-right, fades out when panel opens */}
      <div style={{
        position: "fixed",
        bottom: 10,
        right: 14,
        background: "#0e1420ee",
        border: "1px solid #1a2235",
        borderRadius: 7,
        padding: "8px 12px",
        zIndex: 99,
        backdropFilter: "blur(6px)",
        opacity: selectedTech ? 0 : 1,
        pointerEvents: selectedTech ? "none" : "auto",
        transition: "opacity 0.2s ease",
      }}>
        <div style={{ fontSize: 8, color: "#5a6577", fontWeight: 700, textTransform: "uppercase", letterSpacing: 1, marginBottom: 4 }}>Legend</div>
        {[
          { c: "#3b82f6", l: "Click card → details" },
          { c: "#f59e0b", l: "⚡ Simulate → AI attack path" },
          { c: "#ff4757", l: "PATH = highlighted kill chain" },
        ].map(({ c, l }) => (
          <div key={l} style={{ display: "flex", alignItems: "center", gap: 5, marginBottom: 2 }}>
            <span style={{ width: 6, height: 6, borderRadius: 1, background: c, flexShrink: 0 }} />
            <span style={{ fontSize: 9, color: "#7a8599" }}>{l}</span>
          </div>
        ))}
      </div>

      {/* Source credit - stays fixed at bottom-left, fades out when panel opens */}
      <div style={{
        position: "fixed",
        bottom: 10,
        left: 14,
        fontSize: 8,
        color: "#2a3344",
        fontFamily: "'JetBrains Mono',monospace",
        zIndex: 99,
        opacity: selectedTech ? 0 : 1,
        pointerEvents: selectedTech ? "none" : "auto",
        transition: "opacity 0.2s ease",
      }}>
        © 2025 The MITRE Corporation · ATLAS™ v5.5.0 · Apache 2.0 · Visualization is not endorsed by MITRE
      </div>

      {selectedTech && activeColor && (
        <DetailPanel tech={selectedTech} tacticName={activeTacticName} color={activeColor}
          onClose={() => { setSelectedTech(null); setSelectedTactic(null); }}
          highlightedTechs={highlightedTechs} setHighlightedTechs={setHighlightedTechs}
          config={config} onOpenSettings={() => setShowSettings(true)} />
      )}

      {showSettings && (
        <SettingsModal config={config} setConfig={setConfig} onClose={() => setShowSettings(false)} />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<ATLASMatrix />);
</script>
</body>
</html>
